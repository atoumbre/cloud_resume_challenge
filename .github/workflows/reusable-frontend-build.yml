name: Reusable Frontend Build

on:
  workflow_call:
    inputs:
      public_api_url:
        description: Public API URL available during the frontend build.
        required: true
        type: string
      upload_artifact:
        description: Whether to upload the built frontend as a workflow artifact.
        required: false
        default: false
        type: boolean
      artifact_name:
        description: Artifact name used when uploading the built frontend.
        required: false
        default: frontend-dist
        type: string

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Frontend
        working-directory: frontend
        env:
          PUBLIC_API_URL: ${{ inputs.public_api_url }}
        run: npm run build

      - name: Upload Frontend Artifact
        if: ${{ inputs.upload_artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: frontend/dist
          if-no-files-found: error
