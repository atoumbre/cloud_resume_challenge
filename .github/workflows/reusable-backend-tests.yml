name: Reusable Backend Tests

on:
  workflow_call:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore Pip Cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt', 'backend/requirements-dev.txt') }}

      - name: Install Backend Dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r backend/requirements-dev.txt

      - name: Run Backend Tests
        env:
          AWS_DEFAULT_REGION: us-east-1
        run: pytest backend/test_app.py
