name: Deploy

on:
  push:
    branches: [main]

jobs:
  terraform:
    uses: ./.github/workflows/reusable-terraform-checks.yml

  backend-tests:
    uses: ./.github/workflows/reusable-backend-tests.yml

  frontend-validate:
    uses: ./.github/workflows/reusable-frontend-build.yml
    with:
      public_api_url: https://example.execute-api.us-east-1.amazonaws.com

  infra:
    needs: [terraform, backend-tests, frontend-validate]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      api_endpoint: ${{ steps.tf.outputs.api_endpoint }}
      cloudfront_distribution_id: ${{ steps.tf.outputs.cloudfront_distribution_id }}
      lambda_name: ${{ steps.tf.outputs.lambda_name }}
      s3_bucket_name: ${{ steps.tf.outputs.s3_bucket_name }}
    env:
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Restore Terraform Plugin Cache
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.terraform.d/plugin-cache
          key: ${{ runner.os }}-terraform-${{ hashFiles('infra/.terraform.lock.hcl') }}

      - name: Create Terraform Plugin Cache Directory
        run: mkdir -p "$TF_PLUGIN_CACHE_DIR"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        run: terraform -chdir=infra init

      - name: Terraform Apply
        run: terraform -chdir=infra apply -auto-approve

      - name: Capture Terraform Outputs
        id: tf
        run: |
          echo "api_endpoint=$(terraform -chdir=infra output -raw api_endpoint)" >> "$GITHUB_OUTPUT"
          echo "cloudfront_distribution_id=$(terraform -chdir=infra output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"
          echo "lambda_name=$(terraform -chdir=infra output -raw lambda_function_name)" >> "$GITHUB_OUTPUT"
          echo "s3_bucket_name=$(terraform -chdir=infra output -raw frontend_s3_bucket_name)" >> "$GITHUB_OUTPUT"

  backend:
    needs: infra
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Restore Terraform Plugin Cache
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.terraform.d/plugin-cache
          key: ${{ runner.os }}-terraform-${{ hashFiles('infra/.terraform.lock.hcl') }}

      - name: Create Terraform Plugin Cache Directory
        run: mkdir -p "$TF_PLUGIN_CACHE_DIR"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy Backend
        working-directory: backend
        run: |
          zip -j lambda.zip app.py
          aws lambda update-function-code --function-name "${{ needs.infra.outputs.lambda_name }}" --zip-file fileb://lambda.zip

  frontend-build:
    needs: infra
    uses: ./.github/workflows/reusable-frontend-build.yml
    with:
      public_api_url: ${{ needs.infra.outputs.api_endpoint }}
      upload_artifact: true
      artifact_name: frontend-dist

  frontend:
    needs: [infra, frontend-build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Download Frontend Artifact
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Sync Frontend to S3
        run: aws s3 sync frontend/dist/ "s3://${{ needs.infra.outputs.s3_bucket_name }}" --delete

      - name: Invalidate CloudFront Cache
        run: aws cloudfront create-invalidation --distribution-id "${{ needs.infra.outputs.cloudfront_distribution_id }}" --paths "/*"
